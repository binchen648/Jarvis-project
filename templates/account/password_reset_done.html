{% extends "base.html" %}

{% block title %}重置密码{% endblock %}

{% block content %}
<div class="card card-body bg-base-100 shadow-md max-w-md mx-auto">
  <h1 class="text-2xl font-bold text-center">重置密码</h1>

  <div class="alert alert-info shadow-sm">
    密码重置链接已发送到您的邮箱，请查收并按照提示操作。
  </div>

  <p class="text-center text-sm mt-4 text-base-content/60">
    <a href="{% url 'account_login' %}" class="link link-primary">返回登录</a>
  </p>
</div>
{% endblock %}
