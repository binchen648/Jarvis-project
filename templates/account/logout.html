{% extends "base.html" %}

{% block title %}退出登录{% endblock %}

{% block content %}
<div class="card card-body bg-base-100 shadow-md max-w-md mx-auto">
  <h1 class="text-2xl font-bold text-center">退出登录</h1>

  <p class="text-center text-base-content/70 my-4">
    确定要退出登录吗？
  </p>

  <form method="post" action="{% url 'account_logout' %}">
    {% csrf_token %}
    <button type="submit" class="btn btn-primary w-full">退出登录</button>
  </form>

  <p class="text-center text-sm mt-4 text-base-content/60">
    <a href="/" class="link link-primary">取消</a>
  </p>
</div>
{% endblock %}
