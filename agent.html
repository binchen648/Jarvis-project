<!DOCTYPE html>
<html lang="zh-CN" data-theme="jarvis">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Jarvis OS - Agent Console</title>
    <style>
        /* 1. 主题变量系统 - 确保括号闭合 */
        :root {
            --surface-bg: #08080D;
            --surface-card: rgba(20, 20, 30, 0.65);
            --primary: #8B5CF6;
            --secondary: #4F8CFF;
            --accent: #06B6D4;
            --text-main: #F1F1F6;
            --text-secondary: #9191A8;
        }

        [data-theme="ocean"] {
            --primary: #2563EB;
            --secondary: #06B6D4;
            --accent: #67E8F9;
        }

        [data-theme="sunset"] {
            --primary: #F97316;
            --secondary: #EC4899;
            --accent: #FACC15;
        }

        [data-theme="forest"] {
            --primary: #22C55E;
            --secondary: #14B8A6;
            --accent: #84CC16;
        }

        [data-theme="rose"] {
            --primary: #EC4899;
            --secondary: #8B5CF6;
            --accent: #F472B6;
        }

        /* 2. 全局基础样式 */
        body { 
            background: var(--surface-bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            overflow: hidden;
        }

        /* 3. 极光背景 - 增加颜色混合联动 */
        body::before {
            content: ""; position: fixed; top: -30%; left: -30%; width: 160%; height: 160%; pointer-events: none;
            background: radial-gradient(circle at 20% 20%, color-mix(in srgb, var(--primary) 30%, transparent), transparent 35%),
                        radial-gradient(circle at 80% 25%, color-mix(in srgb, var(--secondary) 20%, transparent), transparent 35%),
                        radial-gradient(circle at 60% 80%, color-mix(in srgb, var(--accent) 15%, transparent), transparent 40%);
            filter: blur(120px); animation: aurora-drift 30s ease-in-out infinite; z-index: -3;
        }

        @keyframes aurora-drift {
            0%, 100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(5%,-5%) scale(1.1); }
        }

        /* 4. 玻璃卡片 - 颜色联动 */
        .glass-card {
            background: linear-gradient(135deg, rgba(255,255,255,.05), rgba(255,255,255,.015));
            backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,.06);
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-4px);
            border-color: color-mix(in srgb, var(--primary) 40%, transparent);
            box-shadow: 0 0 25px color-mix(in srgb, var(--primary) 10%, transparent);
        }

        /* 5. 侧边栏激活项 */
        .nav-active {
            background: rgba(255, 255, 255, 0.08);
            color: white !important;
            position: relative;
        }
        .nav-active::before {
            content: ""; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
            width: 3px; height: 18px; background: var(--primary);
            box-shadow: 0 0 10px var(--primary); border-radius: 0 4px 4px 0;
        }

        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="flex h-screen">

    <!-- 1. 侧边栏 (Sidebar) -->
    <aside class="w-64 bg-black/30 backdrop-blur-3xl border-r border-white/5 flex flex-col z-20">
        <div class="p-8">
            <h1 class="text-2xl font-bold italic text-white tracking-tighter">JARVIS</h1>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-[#9191A8] hover:bg-white/5 transition"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl nav-active"><i class="bi bi-stars" style="color: var(--primary)"></i> Agent</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-[#9191A8] hover:bg-white/5 transition"><i class="bi bi-brain"></i> Memory</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-[#9191A8] hover:bg-white/5 transition"><i class="bi bi-target"></i> Goals</a>
            <a href="#" class="flex items-center gap-3 px-4 py-3 rounded-2xl text-[#9191A8] hover:bg-white/5 transition"><i class="bi bi-heart"></i> Wellness</a>
        </nav>
        <div class="p-6">
             <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-[var(--primary)] to-[var(--secondary)] animate-pulse shadow-[0_0_15px_var(--primary)]"></div>
        </div>
    </aside>

    <!-- 2. 主内容区 (Main Content) -->
    <main class="flex-1 flex flex-col relative z-10 overflow-hidden">
        
        <!-- Header (主题切换器在这里) -->
        <header class="h-20 flex items-center justify-between px-10 border-b border-white/5 bg-black/10 backdrop-blur-xl">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-bold text-white tracking-tight">Agent Console</h2>
                <div class="h-4 w-px bg-white/10"></div>
                <p class="text-xs text-[#9191A8]">管理你的 AI 会话历史</p>
            </div>
            
            <div class="flex items-center gap-6">
                <!-- 核心：主题选择器 -->
                <div class="flex items-center gap-2">
                    <i class="bi bi-palette2 text-xs text-[#9191A8]"></i>
                    <select id="themeSwitcher" class="bg-white/5 border border-white/10 rounded-lg px-3 py-1.5 text-[10px] text-white outline-none cursor-pointer focus:border-[var(--primary)] transition">
                        <option value="jarvis" class="bg-[#08080D]">Jarvis (Default)</option>
                        <option value="ocean" class="bg-[#08080D]">Ocean (Blue)</option>
                        <option value="sunset" class="bg-[#08080D]">Sunset (Orange)</option>
                        <option value="forest" class="bg-[#08080D]">Forest (Green)</option>
                        <option value="rose" class="bg-[#08080D]">Rose (Pink)</option>
                    </select>
                </div>
                
                <div class="relative">
                    <i class="bi bi-search absolute left-3 top-2.5 text-[#5C5C72] text-xs"></i>
                    <input type="text" placeholder="搜索对话..." class="bg-white/5 border border-white/10 rounded-lg px-8 py-2 text-xs focus:outline-none focus:border-[var(--primary)] transition w-48 text-white">
                </div>
                
                <button class="text-xs px-4 py-2 rounded-lg font-bold shadow-lg hover:scale-105 transition flex items-center gap-2" style="background: var(--primary); color: white;">
                    <i class="bi bi-plus-lg"></i> 新建对话
                </button>
            </div>
        </header>

        <!-- 对话列表列表区 -->
        <div class="flex-1 overflow-y-auto p-10 no-scrollbar">
            
            <!-- 统计栏 (颜色随主题变化) -->
            <div class="flex gap-8 mb-10 text-[10px] uppercase tracking-widest text-[#5C5C72] font-bold">
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full" style="background: var(--primary)"></span> 3 总计对话
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]"></span> 12 工具调用
                </div>
                <div class="flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full" style="background: var(--accent)"></span> DeepSeek-V3 引擎
                </div>
            </div>

            <!-- 卡片网格 -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <!-- 对话卡片 1 -->
                <div class="glass-card p-6 rounded-[2.5rem] group cursor-pointer" style="border-top: 2px solid var(--primary)">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-10 h-10 rounded-2xl flex items-center justify-center" style="background: color-mix(in srgb, var(--primary) 15%, transparent); color: var(--primary)">
                            <i class="bi bi-chat-dots-fill text-xl"></i>
                        </div>
                        <span class="text-[10px] font-bold" style="color: var(--primary)">刚刚活跃</span>
                    </div>
                    <h3 class="text-white font-bold text-lg mb-2">学习计划调整</h3>
                    <p class="text-xs text-[#9191A8] line-clamp-2 leading-relaxed mb-6">AI: 我根据你最近在算法方面的记忆曲线，重新优化了今晚的复习序列...</p>
                    <div class="flex justify-between items-center pt-4 border-t border-white/5 text-[10px] text-[#5C5C72]">
                        <span>06/17 08:27</span>
                        <i class="bi bi-arrow-right text-lg group-hover:translate-x-1 transition" style="color: var(--primary)"></i>
                    </div>
                </div>

                <!-- 模拟卡片 2 -->
                <div class="glass-card p-6 rounded-[2.5rem] group cursor-pointer">
                    <div class="flex justify-between items-start mb-6">
                        <div class="w-10 h-10 rounded-2xl bg-white/5 text-[#5C5C72] flex items-center justify-center">
                            <i class="bi bi-chat-left-text text-xl"></i>
                        </div>
                        <span class="text-[10px] text-[#5C5C72] font-bold">2 小时前</span>
                    </div>
                    <h3 class="text-white font-bold text-lg mb-2">对话 06/17 04:09</h3>
                    <p class="text-xs text-[#9191A8] line-clamp-2 leading-relaxed mb-6">摘要生成中...</p>
                    <div class="flex justify-between items-center pt-4 border-t border-white/5 text-[10px] text-[#5C5C72]">
                        <span>06/17 04:09</span>
                        <i class="bi bi-arrow-right text-lg transition"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- 悬浮 AI Core -->
        <div class="absolute bottom-8 right-8 z-50">
             <div class="w-14 h-14 rounded-full flex items-center justify-center text-white cursor-pointer hover:scale-110 transition shadow-2xl relative" style="background: var(--primary)">
                <div class="absolute inset-0 rounded-full animate-ping opacity-20" style="background: var(--primary)"></div>
                <i class="bi bi-stars text-xl"></i>
             </div>
        </div>
    </main>

    <!-- 脚本部分 (核心：主题持久化与联动) -->
    <script>
        const switcher = document.getElementById('themeSwitcher');
        
        // 1. 设置并应用主题的函数
        function applyTheme(themeName) {
            // 设置 HTML 根节点的 data-theme
            document.documentElement.setAttribute('data-theme', themeName);
            // 保存到本地存储，实现跨页面联动
            localStorage.setItem('jarvis-theme', themeName);
            console.log('主题切换成功:', themeName);
        }

        if (switcher) {
            // 2. 监听下拉框变化
            switcher.addEventListener('change', (e) => {
                applyTheme(e.target.value);
            });

            // 3. 页面初始化加载逻辑
            window.addEventListener('DOMContentLoaded', () => {
                const savedTheme = localStorage.getItem('jarvis-theme') || 'jarvis';
                applyTheme(savedTheme);
                switcher.value = savedTheme; // 让下拉框显示正确的选项
            });
        }
    </script>
</body>
</html>
